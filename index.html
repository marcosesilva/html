<!--Instale o VSCODE
Baixe as extensões:
pt-br
Dracula tema
material icon theme
color highlight
live server

Crie uma pasta no seu PC

Crie um arquivo no VSCODE e nomei-o como index.html

No VSCode vá em arquivo e selecione salvamento automático

Digite no arquivo criado: html e selecione o html:5

No código criado mude en para pt-br
troque o Titulo
abaixo de body digite <h1></h1> 
entre o>< digite o Titulo que aparecerá no site
abaixo digite <p></p>
entre o >< digite uma frase
abaixo digite <textarea placeholder=""></textarea> 
entre as aspas digite uma frase
abaixo digite <button></button>
entre >< digite a frase
com o botão direito clique em formatar o documento-->


<!DOCTYPE html>                                                                             <!--Aqui mostra o tipo de doc, no caso HTML versão + moderna-->

<html lang="pt-br">                                                                         <!--Aqui Inicia a criação do site e indica o idioma usado-->

<head>                                                                                      <!--Aqui vai as configurações do site-->
    <meta charset="UTF-8">                                                                  <!--Este é o padrão de caracteres Brasil-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">                  <!--Aqui mostra que pode rodar tanto em pc como em cel-->
    <link rel="stylesheet" href="styles.css">                                               <!--Aqui Irá levar ao arquivo CSS que irá dar os acessorios do site -->
    <title>DevClub - Gerador de IA</title>                                                  <!--Aqui é o Titulo do site na busca Google-->
</head>                                                                                     <!--Aqui encerra as configurações do site-->

<body>                                                                                      <!--Aqui inicia o conteudo do site-->
    <h1>CSS Gerador de IA </h1>                                                             <!--Aqui é o titulo que aparecerá no site--><!--É o titulo mais importante com letras maiores que o H2, H3 etc-->
      
    <p>Descreva o que voce imagina e veja a mágica acontecer</p>                            <!--Paragrafo -->

    <textarea placeholder="Digite aqui o seu nome">                                         </textarea>
    <!--Aqui foi digitado textarea e depois acrescentada placeholder-->
    <!--textarea abre uma caixa de texto para o usuário-->
    <!--placeholder é o mesmo que input em Python-->
    <button>Gerar Código</button>                                                           <!--Aqui é inserido um botão-->
</body>                                                                                     <!--Aqui encerra o corpo ou conteudo do site-->

</html>                                                                                     <!--Aqui encerra a criação do site-->
